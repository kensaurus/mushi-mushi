<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      ROBOTS — keep the admin SPA out of every search index.

      The admin console is an authenticated dashboard. Every sub-route
      (`/admin/reports`, `/admin/graph`, `/admin/fixes`, …) is served by the
      same `<div id="root"></div>` shell with no per-route `<title>` or
      `<link rel="canonical">`, then React rewrites the page client-side and
      `lib/auth.tsx` redirects unauthenticated visitors to the login. From
      Google's crawler perspective that looks like:

        • "Page with redirect" — every authenticated route 302-equivalents
          back to `/login` via JS, which Googlebot reports as a redirect.
        • "Duplicate without user-selected canonical" — every route serves
          identical pre-hydration HTML with no canonical pointing anywhere.

      Both errors landed in Google Search Console for the kensaur.us-hosted
      deploy at `/mushi-mushi/admin/*` (7 URLs flagged on 2026-05-07). A
      dashboard should never be crawled in the first place, so the right
      structural fix is to declare the SPA shell `noindex,nofollow`. That
      flag applies to every sub-route the SPA serves because they all
      hydrate from this same shell.

      `googlebot` is set explicitly in addition to the generic `robots`
      directive so a future per-bot robots.txt rule can't accidentally
      undo it. Per Google's robots-meta-tag docs, the most restrictive
      directive wins when both are present.
      https://developers.google.com/search/docs/crawling-indexing/robots-meta-tag
    -->
    <meta name="robots" content="noindex,nofollow" />
    <meta name="googlebot" content="noindex,nofollow" />

    <title>Mushi Mushi — know why your AI-built app broke, with the fix ready</title>
    <meta name="description" content="Your AI shipped it. Mushi tells you why it broke — a plain-English diagnosis and a ready-to-apply fix, right in your editor. Standalone, open source, Sentry optional." />
    <meta name="keywords" content="AI debugging, vibe coding, plain-English diagnosis, bug fix, Cursor, Claude Code, MCP, developer tools, SDK, Sentry alternative" />
    <meta name="author" content="Mushi Mushi" />
    <meta name="theme-color" content="#09090b" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mushi Mushi — know why your AI-built app broke, with the fix ready" />
    <meta property="og:description" content="Your AI shipped it. Mushi tells you why it broke — a plain-English diagnosis and a ready-to-apply fix, right in your editor. Standalone, open source, Sentry optional." />
    <meta property="og:site_name" content="Mushi Mushi" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mushi Mushi — know why your AI-built app broke, with the fix ready" />
    <meta name="twitter:description" content="Your AI shipped it. Mushi tells you why it broke — a plain-English diagnosis and a ready-to-apply fix, right in your editor. Standalone, open source, Sentry optional." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
