# ============================================================
# Wave D D6: canonical label set, kept in sync by labels-sync.yml
#
# Labels are the indexes the public roadmap board groups by:
#   * area:*    — which surface the change touches
#   * wave:*    — release-train milestone bucket
#   * status:*  — current lifecycle stage
#   * type:*    — bug, enhancement, RFC, docs, ops
#   * impact:*  — rough customer-impact tier
# ============================================================

# ----- type
- name: type:bug
  color: d73a4a
  description: Something isn't working
- name: type:enhancement
  color: a2eeef
  description: New feature or improvement
- name: type:rfc
  color: 0052cc
  description: Architectural proposal — needs design conversation
- name: type:docs
  color: 0075ca
  description: Documentation work
- name: type:ops
  color: 5319e7
  description: CI, infra, release, tooling

