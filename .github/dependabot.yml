version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Defence-in-depth on top of pnpm's `minimumReleaseAge` (see
    # pnpm-workspace.yaml). Even when a contributor merges a Dependabot PR
    # without thinking, the *graph* won't include anything younger than
    # the cooldown window. Routine upgrades wait; security advisories
    # bypass the cooldown automatically — Dependabot's `cooldown` only
    # applies to version-bump PRs, not security PRs.
    # SOURCE: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference#cooldown--
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - "*"
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Same rationale as the npm cooldown above. Pinning Actions by SHA
    # (which we already do in .github/workflows/release.yml) doesn't
    # protect against a freshly-pushed malicious tag/SHA — only time does.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - "*"
