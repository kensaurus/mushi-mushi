name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@mushi-mushi/core"
        - "@mushi-mushi/web"
        - "@mushi-mushi/react"
        - "@mushi-mushi/vue"
        - "@mushi-mushi/svelte"
        - "@mushi-mushi/angular"
        - "@mushi-mushi/react-native"
        - "@mushi-mushi/cli"
        - "@mushi-mushi/mcp"
        - "Admin Dashboard"
        - "Server / Edge Functions"
        - "Other / Cross-cutting"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include API examples if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about.
