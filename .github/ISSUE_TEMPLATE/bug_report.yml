name: Bug Report
description: Report a bug in Mushi Mushi
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@mushi/core"
        - "@mushi/web"
        - "@mushi/react"
        - "@mushi/vue"
        - "@mushi/svelte"
        - "@mushi/angular"
        - "@mushi/react-native"
        - "@mushi/cli"
        - "@mushi/mcp"
        - "Admin Dashboard"
        - "Server / Edge Functions"
        - "Other"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, browser, OS, framework version, etc.
      render: shell
