name: Cursor Cloud Agent Dogfood

on:
  # Nightly live test against real Cursor Cloud
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  # Allow manual trigger from Actions UI
  workflow_dispatch:
    inputs:
      live:
        description: 'Run live tier (true) or mocked only (false)'
        required: false
        default: 'true'

jobs:
  mocked-e2e:
    name: Mocked E2E (manual trigger only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MUSHI_ADMIN_URL: http://localhost:6464
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v4.1.0
        # version omitted — pnpm/action-setup reads packageManager from package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @mushi-mushi/e2e-dogfood exec playwright install --with-deps chromium

      - name: Run Cursor Cloud Agent mocked tests
        run: pnpm --filter @mushi-mushi/e2e-dogfood exec playwright test cursor-cloud-agent.spec.ts --reporter=list

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: playwright-report-cursor-mocked
          path: examples/e2e-dogfood/playwright-report/
          retention-days: 7

  live-cursor-e2e:
    name: Live Cursor Agent E2E (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.live == 'true')
    env:
      MUSHI_ADMIN_URL: ${{ secrets.MUSHI_ADMIN_LIVE_URL }}
      MUSHI_API_KEY: ${{ secrets.MUSHI_API_KEY_DOGFOOD }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY_DOGFOOD }}
      E2E_LIVE_CURSOR: '1'
      MUSHI_DOGFOOD_REPO: kensaur/glot-it
      GITHUB_TOKEN: ${{ secrets.GH_DOGFOOD_TOKEN }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v4.1.0
        # version omitted — pnpm/action-setup reads packageManager from package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @mushi-mushi/e2e-dogfood exec playwright install --with-deps chromium

      - name: Run Cursor Cloud Agent live tests
        run: pnpm --filter @mushi-mushi/e2e-dogfood exec playwright test cursor-cloud-agent.spec.ts --reporter=list

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: playwright-report-cursor-live
          path: examples/e2e-dogfood/playwright-report/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            // De-dupe: reuse the existing open dogfood-failure issue instead of
            // opening a new one every night (that pile-up produced #137–#157).
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const titlePrefix = '[Nightly] Cursor Cloud Agent dogfood failed';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'area:cursor-integration',
              per_page: 100,
            });
            const open = existing.data.find(
              (i) => !i.pull_request && i.title.startsWith(titlePrefix),
            );
            const today = new Date().toISOString().slice(0, 10);
            if (open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                body: `Nightly dogfood failed again on ${today}.\n\nRun: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${titlePrefix} — ${today}`,
                labels: ['type:bug', 'area:cursor-integration', 'priority:high'],
                body: `The nightly Cursor Cloud Agent dogfood test failed.\n\nRun: ${runUrl}`,
              });
            }
