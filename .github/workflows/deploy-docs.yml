##
# FILE: deploy-docs.yml
# PURPOSE: Build and deploy the Mushi Mushi documentation site (Nextra static
#          export) to S3 + CloudFront at kensaur.us/mushi-mushi/docs
#
# OVERVIEW:
# - Builds the Nextra app with `output: 'export'` and basePath /mushi-mushi/docs
# - Syncs immutable assets (JS/CSS) with long cache, HTML with short cache
# - Deploys two CloudFront Functions for clean-URL routing + security headers
# - Invalidates CloudFront cache and runs a health check on /mushi-mushi/docs/
#
# DEPENDENCIES:
# - S3 bucket: kensaur.us-mushi-mushi (ap-northeast-1)
# - CloudFront distribution: kensaur.us (E246VQ1C9QYZVB)
# - GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#   CLOUDFRONT_DISTRIBUTION_ID
#
# NOTES:
# - This workflow is independent of the SDK release pipeline
# - Only touches the docs S3 prefix; admin and cloud have their own workflows
# - The CloudFront Functions are created on first run, then updated/published
#   on every subsequent run — fully idempotent
##

name: Deploy Docs Site

on:
  push:
    branches: [master]
    paths:
      - 'apps/docs/**'
      - 'scripts/cloudfront-mushi-docs-*'
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: kensaur.us-mushi-mushi
  S3_PREFIX: mushi-mushi/docs
  MUSHI_BASE_PATH: /mushi-mushi/docs

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y%m%d%H%M")
          COMMIT_COUNT=$(git rev-list --count HEAD)
          DOCS_VERSION="0.1.${COMMIT_COUNT}"
          echo "docs_version=${DOCS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "::notice::Docs ${DOCS_VERSION} (${SHORT_SHA}) built ${BUILD_DATE}"

      - name: Build docs site
        run: pnpm --filter @mushi-mushi/docs build
        env:
          MUSHI_BASE_PATH: ${{ env.MUSHI_BASE_PATH }}
          MUSHI_ASSET_PREFIX: ${{ env.MUSHI_BASE_PATH }}

      - name: Generate version file
        env:
          DOCS_VERSION: ${{ steps.version.outputs.docs_version }}
          BUILD_DATE: ${{ steps.version.outputs.build_date }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          jq -n \
            --arg version "$DOCS_VERSION" \
            --arg buildDate "$BUILD_DATE" \
            --arg commit "$COMMIT" \
            '{version: $version, buildDate: $buildDate, commit: $commit, app: "docs"}' \
            > apps/docs/out/version.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync immutable assets to S3 (JS)
        run: |
          aws s3 sync apps/docs/out/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript" \
            --no-guess-mime-type \
            --exclude "*" \
            --include "*.js"

      - name: Sync immutable assets to S3 (CSS)
        run: |
          aws s3 sync apps/docs/out/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/css" \
            --no-guess-mime-type \
            --exclude "*" \
            --include "*.css"

      - name: Sync immutable assets to S3 (other static)
        run: |
          aws s3 sync apps/docs/out/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.js" \
            --exclude "*.css" \
            --exclude "version.json"

      - name: Sync HTML to S3 (short cache)
        # Per-page HTML for clean URL routing. We use 5 minutes so an
        # invalidation isn't strictly required for content edits, but the
        # cache-bust step below still runs for fast turnaround.
        run: |
          aws s3 sync apps/docs/out/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --cache-control "public, max-age=300, must-revalidate" \
            --content-type "text/html" \
            --no-guess-mime-type \
            --exclude "*" \
            --include "*.html"

      - name: Sync version.json to S3 (no cache)
        run: |
          aws s3 cp apps/docs/out/version.json s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/version.json \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "application/json"

      - name: Deploy CloudFront docs router function
        run: |
          FUNC_NAME="mushi-mushi-docs-router"
          EXISTING_ETAG=$(aws cloudfront describe-function --name "$FUNC_NAME" --region us-east-1 \
            --query 'ETag' --output text 2>/dev/null || echo "")
          if [ -z "$EXISTING_ETAG" ] || [ "$EXISTING_ETAG" = "None" ]; then
            aws cloudfront create-function \
              --name "$FUNC_NAME" \
              --function-config '{"Comment":"Clean-URL routing for mushi-mushi docs","Runtime":"cloudfront-js-2.0"}' \
              --function-code fileb://scripts/cloudfront-mushi-docs-router.js \
              --region us-east-1
          else
            aws cloudfront update-function \
              --name "$FUNC_NAME" \
              --if-match "$EXISTING_ETAG" \
              --function-config '{"Comment":"Clean-URL routing for mushi-mushi docs","Runtime":"cloudfront-js-2.0"}' \
              --function-code fileb://scripts/cloudfront-mushi-docs-router.js \
              --region us-east-1
          fi
          ETAG=$(aws cloudfront describe-function --name "$FUNC_NAME" --region us-east-1 \
            --query 'ETag' --output text)
          aws cloudfront publish-function --name "$FUNC_NAME" --if-match "$ETAG" --region us-east-1

      - name: Deploy CloudFront docs response function
        run: |
          FUNC_NAME="mushi-mushi-docs-response"
          EXISTING_ETAG=$(aws cloudfront describe-function --name "$FUNC_NAME" --region us-east-1 \
            --query 'ETag' --output text 2>/dev/null || echo "")
          if [ -z "$EXISTING_ETAG" ] || [ "$EXISTING_ETAG" = "None" ]; then
            aws cloudfront create-function \
              --name "$FUNC_NAME" \
              --function-config '{"Comment":"Security headers + 404 handling for mushi-mushi docs","Runtime":"cloudfront-js-2.0"}' \
              --function-code fileb://scripts/cloudfront-mushi-docs-response.js \
              --region us-east-1
          else
            aws cloudfront update-function \
              --name "$FUNC_NAME" \
              --if-match "$EXISTING_ETAG" \
              --function-config '{"Comment":"Security headers + 404 handling for mushi-mushi docs","Runtime":"cloudfront-js-2.0"}' \
              --function-code fileb://scripts/cloudfront-mushi-docs-response.js \
              --region us-east-1
          fi
          ETAG=$(aws cloudfront describe-function --name "$FUNC_NAME" --region us-east-1 \
            --query 'ETag' --output text)
          aws cloudfront publish-function --name "$FUNC_NAME" --if-match "$ETAG" --region us-east-1

      - name: Associate CloudFront docs functions with /docs/* behavior
        # `publish-function` only puts the function in the LIVE stage of
        # the Functions service — it does NOT attach the function to any
        # distribution behavior. Each cache behavior has to opt in via
        # `FunctionAssociations`. Without this step, the editorial 404
        # body returned by mushi-mushi-docs-response is silently dropped
        # and visitors see the raw S3 NoSuchKey XML for missing pages
        # (regression observed in production after PR #77 deployed).
        # The shell script is idempotent — if both functions are already
        # attached on the right event types, it makes zero AWS mutating
        # API calls (only a GetDistributionConfig + DescribeFunction).
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: bash scripts/associate-cloudfront-docs-functions.sh

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/mushi-mushi/docs/*" \
            --region us-east-1

      - name: Post-deploy health check
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://kensaur.us/mushi-mushi/docs/version.json" || echo "000")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Health check returned HTTP $HTTP_CODE — CloudFront may still be propagating"
            exit 0
          fi
          DEPLOYED=$(curl -s "https://kensaur.us/mushi-mushi/docs/version.json" | jq -r '.version // "unknown"')
          echo "Deployed docs version: $DEPLOYED"
