name: iOS SDK

on:
  push:
    branches: [master]
    paths:
      - 'packages/ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'packages/ios/**'
      - '.github/workflows/ios.yml'

permissions:
  contents: read

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-26
    timeout-minutes: 25
    defaults:
      run:
        working-directory: packages/ios
    steps:
      # SUPPLY-CHAIN HARDENING: macOS runners only support `audit` mode
      # — Harden-Runner can't enforce egress blocks on macOS today, but
      # it still records every outbound call to the StepSecurity
      # dashboard so a regression is detectable post-hoc. Linux jobs
      # gain the option to flip to `block` + allowlist later.
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Print toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (MushiMushi)
        run: swift build --target MushiMushi

      - name: Run tests
        run: swift test --parallel

      - name: Lint podspec
        run: |
          gem install cocoapods --no-document
          pod lib lint MushiMushi.podspec --allow-warnings --skip-tests

  build-ios-app-shell:
    name: xcodebuild (iPhone simulator)
    runs-on: macos-26
    timeout-minutes: 25
    defaults:
      run:
        working-directory: packages/ios
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -scheme MushiMushi \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build/DerivedData \
            build | xcpretty
