name: Android SDK

on:
  push:
    branches: [master]
    paths:
      - 'packages/android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'packages/android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    name: Gradle build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Validate gradle wrapper config
        run: gradle --version

      - name: Assemble release AAR
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Run unit tests
        run: gradle testReleaseUnitTest --no-daemon --stacktrace

      - name: Upload AAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mushi-android-aar
          path: packages/android/build/outputs/aar/*.aar
          retention-days: 14
