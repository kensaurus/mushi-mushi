##
# FILE: deploy-edge-functions.yml
# PURPOSE: Deploy Supabase Edge Functions whenever the source under
#          packages/server/supabase/functions/** changes on master.
#
# OVERVIEW:
# - Triggered on push to master with changes to functions or this workflow.
# - Also runs on `workflow_dispatch` so an operator can re-deploy on demand.
# - Uses scripts/deploy-edge-function.mjs which posts directly to the
#   Supabase Management API multipart deploy endpoint. We deliberately do
#   NOT pull the supabase CLI here because (a) it pins to a third-party
#   action that occasionally retags, and (b) the Management API path is
#   the same code path our local deploys use, so CI mirrors local exactly.
# - Non-interactive: authenticates with SUPABASE_ACCESS_TOKEN, targets the
#   project ref from SUPABASE_PROJECT_REF.
#
# REQUIREMENTS (one-time setup):
#   GitHub Secrets:
#     - SUPABASE_ACCESS_TOKEN  (sbp_…) — generate at
#       https://supabase.com/dashboard/account/tokens
#     - SUPABASE_PROJECT_REF   = dxptnwrhwsqckaftyymj  (already linked locally)
#
#   gh secret set SUPABASE_ACCESS_TOKEN --body "sbp_…" --repo kensaurus/mushi-mushi
#   gh secret set SUPABASE_PROJECT_REF  --body "dxptnwrhwsqckaftyymj" --repo kensaurus/mushi-mushi
#
# NOTES:
# - Each function is deployed individually to keep error attribution clean
#   when one function fails — `supabase functions deploy` without args would
#   silently abort the rest of the batch on the first failure.
# - `--no-verify-jwt=false` keeps JWT verification on by default; functions
#   that need to be public override this in their own config (rare).
# - Third-party actions are pinned to commit SHAs (Dependabot bumps).
##

name: Deploy Edge Functions

on:
  push:
    branches: [master]
    paths:
      - 'packages/server/supabase/functions/**'
      - 'packages/server/supabase/config.toml'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Specific function to deploy (blank = all)'
        required: false
        default: ''

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # SUPPLY-CHAIN HARDENING: this job uses SUPABASE_ACCESS_TOKEN to
      # deploy edge functions to production. See release.yml for the
      # full rationale.
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'

      - name: Discover functions
        id: discover
        working-directory: packages/server/supabase
        env:
          ONLY: ${{ github.event.inputs.function_name }}
        run: |
          if [ -n "$ONLY" ]; then
            echo "list=$ONLY" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dispatch — deploying only: $ONLY"
          else
            FNS=$(ls -1 functions/ | grep -v '^_' | tr '\n' ' ')
            echo "list=$FNS" >> "$GITHUB_OUTPUT"
            echo "::notice::Push trigger — deploying all functions: $FNS"
          fi

      - name: Deploy each function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          FUNCTIONS: ${{ steps.discover.outputs.list }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF secrets must be set."
            echo "         See workflow header for setup instructions."
            exit 1
          fi
          FAILED=()
          for fn in $FUNCTIONS; do
            echo ""
            echo "::group::Deploy $fn"
            # No --verify-jwt / --no-verify-jwt flag here on purpose:
            # the script reads packages/server/supabase/config.toml and
            # falls back to the platform default (true) when a function
            # has no explicit setting. That mirrors what the supabase
            # CLI would do, and keeps the JWT gate ON for functions
            # like stripe-webhooks / soc2-evidence / usage-aggregator
            # that don't declare verify_jwt = false.
            if node scripts/deploy-edge-function.mjs "$fn"; then
              echo "::notice::deployed: $fn"
            else
              echo "::error::failed to deploy: $fn"
              FAILED+=("$fn")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::${#FAILED[@]} function(s) failed: ${FAILED[*]}"
            exit 1
          fi

      - name: Smoke test /health
        run: |
          sleep 5
          HTTP=$(curl -s -o /tmp/health -w "%{http_code}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/api/health")
          BODY=$(cat /tmp/health)
          echo "HTTP=$HTTP body=$BODY"
          if [ "$HTTP" != "200" ]; then
            echo "::warning::/health returned HTTP $HTTP — function may still be cold-starting"
            exit 0
          fi

      - name: Smoke test CORS preflight from kensaur.us
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X OPTIONS \
            -H "Origin: https://kensaur.us" \
            -H "Access-Control-Request-Method: GET" \
            -H "Access-Control-Request-Headers: authorization,content-type" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/api/v1/admin/dashboard")
          echo "preflight HTTP=$HTTP"
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then
            echo "::error::CORS preflight from kensaur.us failed (HTTP $HTTP) — allowlist may not have taken effect"
            exit 1
          fi
          echo "::notice::CORS preflight from kensaur.us passed (HTTP $HTTP)"
