# FILE: secret-scan.yml
# PURPOSE: Server-side secret scanning with Gitleaks on every PR and
#          push to master. Belt-and-suspenders to the local pre-commit
#          hook (scripts/check-no-secrets.mjs) — that hook can be
#          bypassed with `git commit --no-verify`, but this CI gate
#          cannot. Catches:
#            - Contributors who skipped the hook
#            - Contributors who never installed the hook (e.g. opened a
#              PR via the GitHub web UI without cloning)
#            - Historic leaks introduced before the hook landed (--all
#              mode runs on push to master so the whole tree is checked)
#
# WHY: Gitleaks ships ~150 patterns covering AWS / Stripe / GitHub /
# Anthropic / OpenAI / Slack / Supabase / generic JWT / RSA keys / etc.
# Our local scanner covers the same surface but on staged files only;
# gitleaks-action scans the whole diff (PR) or whole tree (push).
#
# REFERENCES
#   - https://github.com/gitleaks/gitleaks-action
#   - https://github.com/gitleaks/gitleaks

name: Secret scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Full history so push-to-master scans can flag historical
          # commits, not just the diff. PRs use shallow checkout via the
          # action's own git fetch.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only needed for organisations with >25
          # contributors. Personal repos run free indefinitely; the
          # action skips the license check when this var is absent.
