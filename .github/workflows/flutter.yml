name: Flutter SDK

on:
  push:
    branches: [master]
    paths:
      - 'packages/flutter/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'packages/flutter/**'
      - '.github/workflows/flutter.yml'

permissions:
  contents: read

jobs:
  analyze-test:
    name: analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/flutter
    steps:
      # SUPPLY-CHAIN HARDENING: see .github/workflows/release.yml.
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: subosito/flutter-action@9a48871cbeff8679f6337339dc79b806ad9a9a13  # v2.9.1
        with:
          flutter-version: '3.24.x'
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test || (git diff -- lib test && exit 1)

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter expanded

      - name: pub.dev publish dry-run
        run: flutter pub publish --dry-run
