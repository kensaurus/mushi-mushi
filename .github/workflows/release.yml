# FILE: release.yml
# PURPOSE: Version packages via Changesets PR and publish to npm on merge
#
# FLOW:
#   1. Push with changesets → creates/updates "Version Packages" PR
#   2. "Version Packages" PR merged → publishes all bumped packages to npm
#
# REQUIREMENTS:
#   - NPM_TOKEN GitHub secret (Granular Access Token with "Bypass 2FA" enabled)
#   - npm Trusted Publisher configured per package on npmjs.com (for provenance)
#   - GITHUB_TOKEN auto-provided (needs contents:write + pull-requests:write)
#
# SUPPLY-CHAIN HARDENING:
#   All third-party actions are pinned to commit SHAs (with version comment for
#   Dependabot bumps). Floating tags (@v4, @v1) are mutable and are the standard
#   attack vector for malicious updates (cf. tj-actions/changed-files, 2024).
#
# DEFENCE-IN-DEPTH AGAINST workspace:* LEAKS:
#   `pnpm release` runs `node scripts/check-workspace-protocol.mjs` before
#   `changeset publish`. If `changeset version` did not rewrite workspace:* into
#   real semver ranges, the guard fails and the publish aborts. This prevents a
#   recurrence of the v0.1.0 incident where workspace:* leaked into all
#   published tarballs and broke `npm install` for every external user.

name: Release

on:
  push:
    branches: [master]
  # Manual dispatch for cases where the changesets PR squash-merge is attributed
  # to github-actions[bot], which suppresses the downstream `push` trigger via
  # GitHub's anti-loop protection. Use this to re-fire the publish step against
  # the current `master` HEAD without rewriting history.
  #
  # OIDC TRUSTED-PUBLISHER GOTCHA (observed 2026-04-24, runs 24880104469 and
  # 24880565985): with NPM_CONFIG_PROVENANCE=true, npm rejects the publish
  # PUT with `404 Not Found - "<pkg>@<version>" is not in this registry`
  # **even though Sigstore signing succeeds and the provenance statement is
  # uploaded to the transparency log**. This 404 is npm's way of saying
  # "Trusted Publisher rule didn't match the OIDC claims" — same payload as
  # a missing-package 404, no usable hint about which claim diverged.
  #
  # ROOT CAUSE: npm CLI < 11.5.1 ships a half-baked OIDC handshake that
  # silently falls back to the missing-package 404 when the Trusted Publisher
  # exchange fails. npm 11.5.1 (bundled with Node.js 24+) added clearer
  # diagnostics and the actual fix. setup-node@v4 with `node-version: 22`
  # gives you Node 22 + npm 10, which is too old. Bump to `node-version: 24`
  # to ship npm 11.5+ with the working OIDC code path.
  #
  # Secondary requirement: every publishable package must have a Trusted
  # Publisher rule on npmjs.com pointing at
  # `kensaurus/mushi-mushi/.github/workflows/release.yml` on `master`.
  # Reproduces on both `push` and `workflow_dispatch`.
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      # SUPPLY-CHAIN HARDENING: Harden-Runner monitors network egress,
      # file integrity, and process activity so a compromised dep or
      # action can't silently exfiltrate secrets or open a reverse
      # shell. `audit` mode logs without blocking — flip to `block`
      # with an `allowed-endpoints` list once the baseline stabilises.
      # Detected the tj-actions, NX, Shai-Hulud, and Axios attacks.
      # SOURCE: https://github.com/step-security/harden-runner
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v4.1.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      # Parity with .github/workflows/ci.yml — the gates that run on PRs
      # must also run on push-to-master so a release can never ship a
      # publish-readiness regression that slipped past a force-pushed PR
      # or an admin-merge bypass.
      - name: Verify public changelog is in sync
        run: pnpm changelog:check

      # Block orphaned changesets (frontmatter targets only ignored
      # packages) before they reach the version PR. See
      # scripts/check-changeset-orphans.mjs header for the incident
      # context (PR #102 / #121, 2026-05-19).
      - name: Check for orphaned changesets
        run: pnpm check:changeset-orphans

      - name: Check publish readiness
        run: node scripts/check-publish-readiness.mjs

      - name: Check Migration Hub catalog sync
        # Migration Hub Phase 2 release gate. Fails if the docs catalog,
        # CLI catalog, backend slug allowlist, or admin card catalog
        # disagree on the published guide set — every public surface that
        # talks about migrations must agree before a release ships.
        run: pnpm check:migration-catalog

      - name: Check Edge Function import boundaries
        # Release gate for the Supabase deploy bundle. See ci.yml for the
        # full rationale; in short: any `_shared/` → sibling-function
        # relative import (or any cross-function import) leaves the
        # Supabase deploy with an unresolved module specifier and the
        # platform rejects the deploy with HTTP 400. We catch it here
        # so a release can never queue a broken Edge Function deploy.
        run: pnpm check:edge-fn-imports

      - name: Check license headers
        run: node scripts/check-license-headers.mjs

      - name: Check dead buttons
        run: node scripts/check-dead-buttons.mjs

      - name: Check JSX unicode escapes
        run: node scripts/check-jsx-unicode-escapes.mjs

      - name: Check bundle sizes
        run: pnpm --filter @mushi-mushi/core --filter @mushi-mushi/web --filter @mushi-mushi/react exec size-limit

  release:
    name: Version & Publish
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # See note on the `ci` job above. Harden-Runner is doubly important
      # on the publish job because this is where NPM_TOKEN and the OIDC
      # publish identity are in scope — exactly the credentials a
      # compromised dep would target for exfiltration.
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v4.1.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          # MUST be 24+: ships npm >= 11.5.1, required for working OIDC
          # Trusted Publisher handshake. Node 22 ships npm 10 which produces
          # a misleading 404 when the OIDC exchange fails.
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Check publish readiness
        # Fails if any publishable package.json is missing required fields
        # (files, exports/types, engines, repository.directory, license).
        # Adds a seatbelt on top of npm's own publish validation — npm only
        # checks syntactic correctness, not whether `files` actually
        # includes README/LICENSE or whether `repository.directory` points
        # at the right folder.
        run: node scripts/check-publish-readiness.mjs

      - name: Bootstrap brand-new packages (no provenance first publish)
        # REASON: NPM_CONFIG_PROVENANCE=true requires a Trusted Publisher rule
        # to be pre-configured on npmjs.com for EACH package. Brand-new packages
        # don't have that rule yet — the OIDC exchange fails and `changeset publish`
        # returns a misleading 404. This step builds all packages (Turbo-cached)
        # then publishes any not-yet-existing packages directly via NPM_TOKEN
        # (no provenance) so they exist on the registry before `changeset publish`.
        # Future releases go through the normal OIDC-provenance path once the
        # Trusted Publisher rule is added on npmjs.com for the new package.
        # See: scripts/bootstrap-new-packages.mjs
        run: |
          pnpm turbo run build --output-logs=errors-only
          node scripts/bootstrap-new-packages.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf  # v1.7.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Verify published tarballs do not contain workspace:*
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: node scripts/verify-published-tarballs.mjs

      # SUPPLY-CHAIN VERIFY (post-publish):
      #   `npm audit signatures` checks every installed dep against npm's
      #   ECDSA registry signatures + Sigstore provenance. If a transitive
      #   dep got swapped on the registry between resolution and now (e.g.
      #   tarball tampering), this fails and we get a loud signal in the
      #   release job summary instead of finding out from a user.
      #
      # NOTE: pnpm doesn't expose this, so we shell out to npm itself.
      # `--audit-level=high` keeps the gate noise-free — low/info findings
      # don't block the release, but tampered/missing signatures will.
      - name: Audit signatures of installed dependencies
        if: steps.changesets.outputs.published == 'true'
        # CDN PROPAGATION RACE (observed 2026-05-20, run 26149167393; recurred
        # 2026-07-04, run 28698365327 — create-mushi-mushi@0.5.21 still
        # ETARGET after the full 63s/7-attempt window, even though the
        # publish itself succeeded and the version was resolvable on npm
        # moments later):
        #   `npm install` against a freshly-published version can return
        #   `ETARGET / No matching version found for <pkg>@<ver>` for up
        #   to ~30s (sometimes longer) after `changeset publish` succeeds,
        #   because npm's registry mirror takes time to propagate the new
        #   manifest. The tarball is already signed and verified by the
        #   previous step — this audit just needs the registry to catch up.
        #   Retry with exponential backoff (1, 2, 4, 8, 16, 32, 64, 128s =
        #   255s total wait across 9 attempts) before failing the release —
        #   widened from 7/63s after the race outlasted that window once.
        #
        # NB: only ETARGET / "No matching version" failures are treated
        # as the CDN race. Auth / network / registry-outage failures
        # surface with their own error string and the npm output is
        # echoed verbatim so the release log isn't misleading.
        run: |
          set -euo pipefail
          mkdir -p /tmp/audit-sigs && cd /tmp/audit-sigs

          install_with_retry() {
            local pkg="$1"
            local ver="$2"
            local max_attempts=9
            local delay=1
            local last_log
            last_log=$(mktemp)
            for attempt in $(seq 1 "$max_attempts"); do
              if npm install --no-save --ignore-scripts "${pkg}@${ver}" >"$last_log" 2>&1; then
                cat "$last_log"
                rm -f "$last_log"
                return 0
              fi
              cat "$last_log"
              # Only retry the propagation race; bail fast on every
              # other npm failure so the operator sees the real cause.
              if ! grep -qE 'ETARGET|No matching version found' "$last_log"; then
                echo "::error::npm install ${pkg}@${ver} failed for a non-propagation reason (see log above) — not retrying."
                rm -f "$last_log"
                return 1
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "::error::Failed to install ${pkg}@${ver} after ${max_attempts} attempts — npm registry did not propagate the new manifest in time (last error: ETARGET / No matching version)."
                rm -f "$last_log"
                return 1
              fi
              echo "::warning::npm install ${pkg}@${ver} hit ETARGET (attempt ${attempt}/${max_attempts}); retrying in ${delay}s (CDN propagation race)"
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          for pkg in $(echo "$PUBLISHED" | jq -r '.[].name'); do
            ver=$(echo "$PUBLISHED" | jq -r --arg n "$pkg" '.[] | select(.name == $n) | .version')
            echo "Auditing signatures for ${pkg}@${ver}"
            install_with_retry "$pkg" "$ver"
          done
          npm audit signatures --audit-level=high
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}

      # Wave D D2: regenerate the customer-facing changelog whenever Changesets
      # has actually bumped versions (either on a publish or when refreshing
      # the release PR). The script is deterministic, so committing it back is
      # safe — it only changes if per-package CHANGELOGs or pending changesets
      # changed in the same push.
      - name: Aggregate public changelog
        if: steps.changesets.outputs.published == 'true' || steps.changesets.outputs.hasChangesets == 'true'
        run: pnpm changelog:aggregate

      - name: Commit aggregated changelog
        if: steps.changesets.outputs.published == 'true' || steps.changesets.outputs.hasChangesets == 'true'
        run: |
          if ! git diff --quiet -- CHANGELOG.md apps/docs/data/changelog.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md apps/docs/data/changelog.json
            git commit -m "chore: refresh public changelog [skip ci]"
            # Use HEAD:<branch> form because changesets/action checks out
            # `changeset-release/master` (or master itself on a publish) without
            # setting upstream tracking on the local ref. A bare `git push`
            # therefore fails with "no upstream branch", aborting the release.
            current_branch=$(git rev-parse --abbrev-ref HEAD)
            git push origin "HEAD:${current_branch}"
          else
            echo "changelog: no drift to commit"
          fi

      - name: Publish MCP server to the official registry
        # When @mushi-mushi/mcp ships a new version, register it with the
        # official MCP registry (registry.modelcontextprotocol.io). Everything
        # downstream (Glama, PulseMCP, Cursor's directory) auto-syncs from there.
        # GitHub OIDC authenticates the `io.github.kensaurus/*` namespace using
        # the job's `id-token: write` permission — no extra secret needed.
        # continue-on-error: a registry hiccup must never fail the npm release.
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '@mushi-mushi/mcp')
        continue-on-error: true
        run: |
          set -euo pipefail
          node scripts/sync-server-json-version.mjs
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${os}_${arch}.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          cd packages/mcp && ../../mcp-publisher publish && cd ../..
          echo "Verifying registry record (propagation may lag)…"
          sleep 5
          curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.kensaurus/mushi-mushi" \
            | grep -q "io.github.kensaurus/mushi-mushi" \
            && echo "✓ Mushi MCP server is live in the official registry" \
            || echo "::warning::MCP registry record not visible yet — re-check in a few minutes."

      - name: Sync published versions to sdk_versions catalog
        # Keep the console freshness chips accurate without hand-written
        # migrations. On any failure we warn but do not fail the release —
        # the daily sdk-versions-cron reconcile is the backstop.
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-sdk-versions.mjs

      - name: Published packages summary
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          {
            echo "## Published packages"
            echo ""
            echo '```json'
            echo "$PUBLISHED" | jq '.'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
