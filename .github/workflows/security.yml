# FILE: security.yml
# PURPOSE: Supply-chain & static-analysis baseline for the three public npm
#          entrypoints (mushi-mushi, create-mushi-mushi, @mushi-mushi/cli).
#
#   1. CodeQL — semantic analysis of TypeScript/JavaScript, finds
#      injection sinks, taint flows, prototype pollution, etc.
#   2. npm audit — fails the build on high / critical production deps
#      across the whole workspace.
#
# Runs on every PR, every push to master, and weekly via cron so a
# newly-disclosed CVE in a transitive dep gets caught without a commit.
#
# Actions are pinned to SHAs (like release.yml) to defeat tag hijacks.

name: Security

on:
  push:
    branches: [master]
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  schedule:
    # Mondays 06:00 UTC — catch newly-disclosed CVEs weekly.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          category: '/language:${{ matrix.language }}'

  audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v4.1.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # --audit-level=high: we gate the build on high/critical only. Moderate
      # and lower findings are surfaced in the log but do not fail so a single
      # noisy dev-dep advisory does not block unrelated PRs.
      #
      # 2026-07-14: npm retired the legacy audit endpoints pnpm still calls
      # (HTTP 410 / ERR_PNPM_AUDIT_BAD_RESPONSE). Tolerate that specific
      # registry outage only — a real High/Critical advisory still fails —
      # until pnpm adopts the bulk-advisory endpoint.
      - name: pnpm audit (production deps)
        run: |
          set +e
          output="$(pnpm audit --prod --audit-level=high 2>&1)"
          code=$?
          echo "$output"
          if [ "$code" -eq 0 ]; then
            exit 0
          fi
          if echo "$output" | grep -qE 'ERR_PNPM_AUDIT_BAD_RESPONSE|being retired|410'; then
            echo "::warning::pnpm audit endpoint retired by npm (HTTP 410); skipping supply-chain gate. dependency-review + CodeQL still enforce."
            exit 0
          fi
          echo "::error::pnpm audit reported High/Critical advisories."
          exit "$code"
