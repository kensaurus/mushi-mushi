# FILE: security.yml
# PURPOSE: Supply-chain & static-analysis baseline for the three public npm
#          entrypoints (mushi-mushi, create-mushi-mushi, @mushi-mushi/cli).
#
#   1. CodeQL — semantic analysis of TypeScript/JavaScript, finds
#      injection sinks, taint flows, prototype pollution, etc.
#   2. npm audit — fails the build on high / critical production deps
#      across the whole workspace.
#
# Runs on every PR, every push to master, and weekly via cron so a
# newly-disclosed CVE in a transitive dep gets caught without a commit.
#
# Actions are pinned to SHAs (like release.yml) to defeat tag hijacks.

name: Security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Mondays 06:00 UTC — catch newly-disclosed CVEs weekly.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          category: '/language:${{ matrix.language }}'

  audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # --audit-level=high: we gate the build on high/critical only. Moderate
      # and lower findings are surfaced in the log but do not fail so a single
      # noisy dev-dep advisory does not block unrelated PRs.
      - run: pnpm audit --prod --audit-level=high
