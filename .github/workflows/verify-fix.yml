# FILE: verify-fix.yml
# PURPOSE: Verify Mushi Mushi bug fixes after deployment via Playwright
#
# SECURITY: report_id and deployment URLs are passed via env, never interpolated
# directly into shell. This blocks script-injection attacks via crafted
# deployment payloads.

name: Verify Fix

on:
  deployment_status:
    types: [success]
  workflow_dispatch:
    inputs:
      report_id:
        description: 'Mushi report ID to verify'
        required: true
      deployment_url:
        description: 'Deployment URL to test against'
        required: true

permissions:
  contents: read
  deployments: read

jobs:
  verify:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' && github.event.deployment.payload.report_id)
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
      - run: pnpm install --filter @mushi-mushi/verify
      - run: npx playwright install chromium

      - name: Run verification
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REPORT_ID: ${{ github.event.inputs.report_id || github.event.deployment.payload.report_id }}
          DEPLOY_URL: ${{ github.event.inputs.deployment_url || github.event.deployment.environment_url }}
        run: |
          cd packages/verify
          npx tsx src/run.ts --report-id="$REPORT_ID" --deployment-url="$DEPLOY_URL"
