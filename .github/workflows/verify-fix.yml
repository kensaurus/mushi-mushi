# FILE: verify-fix.yml
# PURPOSE: Verify Mushi Mushi bug fixes after deployment via Playwright

name: Verify Fix

on:
  deployment_status:
    types: [success]
  workflow_dispatch:
    inputs:
      report_id:
        description: 'Mushi report ID to verify'
        required: true
      deployment_url:
        description: 'Deployment URL to test against'
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' && github.event.deployment.payload.report_id)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --filter @mushi/verify
      - run: npx playwright install chromium

      - name: Run verification
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          REPORT_ID="${{ github.event.inputs.report_id || github.event.deployment.payload.report_id }}"
          DEPLOY_URL="${{ github.event.inputs.deployment_url || github.event.deployment.environment_url }}"
          cd packages/verify
          npx tsx src/run.ts --report-id="$REPORT_ID" --deployment-url="$DEPLOY_URL"
