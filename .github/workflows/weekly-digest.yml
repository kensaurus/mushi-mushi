name: Weekly Shipping Digest

# Fires every Friday at 17:00 UTC — "what shipped this week" summary as a
# GitHub Release tag so the community can subscribe via GitHub's watch/release
# notification. If no packages were published this week, the job exits silently.
#
# Also fires on manual dispatch for release-day drafts.

on:
  schedule:
    - cron: '0 17 * * 5'   # every Friday 17:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (only print, do not create GitHub Release)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Compute this-week's package releases
        id: digest
        run: |
          set -euo pipefail

          SINCE=$(date -d '7 days ago' '+%Y-%m-%d')
          echo "since=${SINCE}" >> "$GITHUB_OUTPUT"

          # Collect git tags published in the last 7 days (format: @pkg@x.y.z)
          TAGS=$(git tag --sort=-creatordate \
            --format='%(refname:short) %(creatordate:short)' \
            | awk -v since="$SINCE" '$2 >= since {print $1}' \
            | grep '^@mushi-mushi/' \
            | head -40 || true)

          if [ -z "$TAGS" ]; then
            echo "no_releases=true" >> "$GITHUB_OUTPUT"
            echo "No Mushi packages were released this week — skipping digest."
            exit 0
          fi

          echo "no_releases=false" >> "$GITHUB_OUTPUT"

          # Build a markdown digest
          WEEK_LABEL=$(date '+%b %d')
          BODY="## 🐛 Mushi Mushi — what shipped this week (${WEEK_LABEL})

Packages published to npm since ${SINCE}:

$(echo "$TAGS" | sed 's/^/- \`/' | sed 's/$/\`/')

### Quick start

\`\`\`bash
npx mushi-mushi
\`\`\`

Full changelog: https://kensaur.us/mushi-mushi/docs/changelog

_Mushi-chan keeps the loop running. 虫虫_"

          # Escape for GitHub output (multiline)
          EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          {
            echo "body<<${EOF}"
            echo "$BODY"
            echo "${EOF}"
          } >> "$GITHUB_OUTPUT"

          # Create a digest tag name: weekly-YYYY-WW
          WEEK_TAG="weekly-$(date '+%Y-W%V')"
          echo "week_tag=${WEEK_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (weekly digest)
        if: steps.digest.outputs.no_releases == 'false' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEEK_TAG: ${{ steps.digest.outputs.week_tag }}
          BODY: ${{ steps.digest.outputs.body }}
        run: |
          # Skip if this week's tag already exists (idempotent)
          if git rev-parse "$WEEK_TAG" &>/dev/null; then
            echo "Weekly tag $WEEK_TAG already exists — skipping."
            exit 0
          fi
          gh release create "$WEEK_TAG" \
            --title "Weekly digest $(date '+%b %d, %Y')" \
            --notes "$BODY" \
            --prerelease \
            --target master

      - name: Dry-run output
        if: steps.digest.outputs.no_releases == 'false' && github.event.inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN: would create release ${{ steps.digest.outputs.week_tag }} ==="
          echo "${{ steps.digest.outputs.body }}"

      - name: Summary
        if: steps.digest.outputs.no_releases == 'false'
        run: |
          {
            echo "## Weekly shipping digest"
            echo ""
            echo "${{ steps.digest.outputs.body }}"
          } >> "$GITHUB_STEP_SUMMARY"
