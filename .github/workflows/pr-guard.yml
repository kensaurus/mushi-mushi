name: PR guard

# Detects and labels/comments on PRs that violate contribution hygiene:
#   1. Targets a base branch other than `master`
#   2. Adds root-level scripts (*.py, *.sh, *.mjs, *.js outside scripts/)
#   3. Comes from a first-time contributor with a very large diff (>500 files)
#      — a common signal for bounty-farming forks that inflate diff size by
#      targeting a stale branch.
#
# SECURITY: uses `pull_request_target` so the workflow runs with base-branch
# permissions. We do NOT check out PR code at any point — all analysis is
# done via the GitHub API through the `github-script` action.
# No secrets beyond GITHUB_TOKEN (read/write on PRs only) are in scope.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  guard:
    name: Check PR hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip for maintainer PRs (from same repo) — we trust those.
    if: github.event.pull_request.head.repo.full_name != github.repository
    steps:
      # SUPPLY-CHAIN HARDENING: pull_request_target runs with write permissions.
      # Harden-Runner is the safety net; we never checkout PR HEAD code.
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Analyse PR and enforce hygiene
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNum = pr.number;

            const issues = [];
            const labelsToAdd = [];

            // ── 1. Wrong base branch ──────────────────────────────────────
            if (pr.base.ref !== 'master') {
              issues.push(
                `**Wrong base branch:** this PR targets \`${pr.base.ref}\` instead of \`master\`. ` +
                `Please close this PR and open a new one targeting \`master\`. ` +
                `(Targeting \`main\` or another branch inflates the diff with the maintainer's own prior commits, ` +
                `which is a common signal of automated bounty-farming.)`
              );
              labelsToAdd.push('needs: retarget');
            }

            // ── 2. Root-level scripts ─────────────────────────────────────
            let files = [];
            try {
              const resp = await github.rest.pulls.listFiles({
                owner, repo, pull_number: prNum, per_page: 100
              });
              files = resp.data;
            } catch (e) {
              core.warning(`Could not list PR files: ${e.message}`);
            }

            const rootScripts = files.filter(f => {
              const p = f.filename;
              // Root-level *.py / *.sh added by the PR (not in scripts/)
              return f.status === 'added' &&
                !p.includes('/') &&
                /\.(py|sh|rb|ps1)$/.test(p);
            });

            if (rootScripts.length > 0) {
              issues.push(
                `**Root-level script added:** \`${rootScripts.map(f => f.filename).join('`, `')}\`. ` +
                `Executable scripts do not belong in the repo root. ` +
                `If this is a helper script for the project, it belongs under \`scripts/\`. ` +
                `If it was generated by an automation tool to open this PR, please remove it.`
              );
              labelsToAdd.push('needs: cleanup');
            }

            // ── 3. First-time contributor with huge diff ──────────────────
            // Large diffs from first-timers usually mean the PR targets a
            // stale branch that diverges by hundreds of commits from master.
            const isFirstTime = pr.author_association === 'FIRST_TIME_CONTRIBUTOR' ||
                                 pr.author_association === 'NONE';
            if (isFirstTime && pr.changed_files > 500) {
              issues.push(
                `**Inflated diff:** this PR changes ${pr.changed_files} files. ` +
                `For a first-time contribution this almost always means the PR ` +
                `is targeting a branch that has diverged from \`master\`. ` +
                `Please check that your branch was created from the latest \`master\` ` +
                `and that you are targeting \`master\` as the base.`
              );
              if (!labelsToAdd.includes('needs: retarget')) {
                labelsToAdd.push('needs: investigation');
              }
            }

            // ── Apply labels (best-effort) ────────────────────────────────
            if (labelsToAdd.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNum, labels: labelsToAdd
                });
              } catch (e) {
                // Label may not exist yet — non-fatal
                core.warning(`Could not add labels: ${e.message}`);
              }
            }

            // ── Post comment if any issues were found ─────────────────────
            if (issues.length === 0) {
              core.info('PR guard: no hygiene issues detected.');
              return;
            }

            const body = [
              '## PR guard ⚠️',
              '',
              'The automated PR guard found the following issue(s). ' +
              'Please address them before requesting a review.',
              '',
              ...issues.map((msg, i) => `${i + 1}. ${msg}`),
              '',
              '---',
              '*This comment was posted by the [PR guard workflow](.github/workflows/pr-guard.yml). ' +
              'See [CONTRIBUTING.md](CONTRIBUTING.md) §"What we don\'t accept" for the full policy.*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNum, body
            });

            // Fail the check so the guard status is visible in the PR
            core.setFailed(
              `PR guard found ${issues.length} hygiene issue(s) — see the comment posted on the PR.`
            );
