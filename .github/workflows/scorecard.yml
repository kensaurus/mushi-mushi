# FILE: scorecard.yml
# PURPOSE: Run OpenSSF Scorecard against this repository to score the
#          project's supply-chain security posture (Pinned-Dependencies,
#          Token-Permissions, Branch-Protection, Code-Review, Dangerous-
#          Workflow, Maintained, SAST, Security-Policy, Signed-Releases,
#          Vulnerabilities). Results are uploaded to GitHub's code scanning
#          dashboard (Security tab) and published to OpenSSF's API so the
#          score is visible at https://scorecard.dev/viewer/?uri=github.com/
#          kensaurus/mushi-mushi and can be displayed as a README badge.
#
# WHY: Scorecard is the OSSF-recommended baseline for any public OSS repo
# that publishes packages. Most npm supply-chain attacks (tj-actions,
# NX, Shai-Hulud, Axios) exploited gaps Scorecard surfaces; running it
# weekly closes the feedback loop on regressions.
#
# CONSTRAINTS imposed by the publish API
#   - Scorecard's `publish_results: true` requires a strict workflow shape
#     (no top-level env, no workflow-level write permissions, only the
#     analysis job uses id-token, no containers/services, ubuntu only).
#     Don't add any of those — see https://github.com/ossf/scorecard-action#publishing-results
#   - Third-party actions must come from the action's allow-list (which
#     includes step-security/harden-runner, github/codeql-action/upload-sarif,
#     actions/checkout, actions/upload-artifact, ossf/scorecard-action).
#
# REFERENCES
#   - https://github.com/ossf/scorecard-action
#   - https://github.com/nodejs/node/blob/main/.github/workflows/scorecard.yml

name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '30 1 * * 6'
  push:
    branches: [master]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          sarif_file: results.sarif
