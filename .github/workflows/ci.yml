# FILE: ci.yml
# PURPOSE: Run build, typecheck, lint, tests, and bundle size checks on PRs
#
# NOTE: Pushes to master are handled by release.yml (which includes its own
# CI job before the release step). This avoids duplicate CI runs.
#
# SUPPLY-CHAIN HARDENING: third-party actions pinned to commit SHAs (Dependabot
# updates them via PR). See release.yml header for context.

name: CI

on:
  pull_request:
    branches: [master]
  # AUTOMATIC FALLBACK for the changesets release PR:
  #   GitHub silently drops the `pull_request` event whenever the branch
  #   push is attributed to `github-actions[bot]` (anti-loop protection).
  #   The Release workflow's changesets/action *always* pushes to
  #   `changeset-release/master` as that bot, so the required Build & Test
  #   check never fires on PR #N+1 without operator intervention. Observed
  #   on PR #45, #102, #124 — and on every Changesets version PR before we
  #   added this trigger.
  #
  #   By listening on `push` to `changeset-release/master` we register
  #   Build & Test directly against the head commit of the release PR,
  #   which satisfies the master branch protection ruleset without any
  #   manual `gh workflow run` or empty-commit nudge.
  push:
    branches: [changeset-release/master]
  # Manual fallback for the rare case where the `pull_request` trigger is
  # also dropped on a feature branch (observed once on PR #45). Operator
  # with write access can `gh workflow run ci.yml -r <branch>` to backfill
  # the required check.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # SUPPLY-CHAIN GATE: review every dep diff in a PR for known vulns
  # before any code runs. This catches a malicious package being added
  # via `pnpm add` long before it reaches a release. `fail-on-severity:
  # high` keeps the gate noise-free — moderate/low advisories surface as
  # warnings in the PR but don't block the merge.
  # SOURCE: https://docs.github.com/en/code-security/how-tos/secure-your-supply-chain/manage-your-dependency-security/configuring-the-dependency-review-action
  dependency-review:
    name: Dependency review
    # dependency-review-action requires pull_request context (needs base/head ref).
    # Skip on workflow_dispatch (manual CI trigger fallback for the release PR).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # SUPPLY-CHAIN HARDENING: see release.yml for rationale.
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          # Bumped to 24 in lockstep with release.yml. Node 22 ships npm
          # 10, which has a half-baked OIDC handshake (see release.yml
          # header) and lacks the new `min-release-age` config gate the
          # supply-chain hardening pass relies on. Node 24 ships npm
          # 11.5+ which fixes both.
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies for known vulnerabilities
        # Supply-chain gate (P2): fails if any installed package has a
        # High or Critical advisory. Moderate/Low advisories surface as
        # warnings via the separate dependency-review job on PRs but do
        # not block the merge. `--audit-level=high` matches pnpm's own
        # recommended CI threshold.
        run: pnpm audit --audit-level=high

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm lint

      - name: Check design tokens
        run: pnpm check:design-tokens

      - name: Check brand token build freshness
        run: pnpm check:brand-tokens-fresh

      - run: pnpm test

      # Wave D D2: enforce that the public changelog is in sync with the
      # per-package CHANGELOGs and pending changesets. If a PR touches
      # changesets without regenerating, this fails with an actionable error.
      - name: Verify public changelog is in sync
        run: pnpm changelog:check

      # Block orphaned changesets (frontmatter targets only ignored
      # packages) before they reach master. Without this gate they
      # explode the release with "No commits between master and
      # changeset-release/master" — see scripts/check-changeset-orphans.mjs
      # header for the full incident (PR #102 / #121, 2026-05-19).
      - name: Check for orphaned changesets
        run: pnpm check:changeset-orphans

      - name: Check publish readiness
        run: node scripts/check-publish-readiness.mjs

      - name: Check license headers
        run: node scripts/check-license-headers.mjs

      - name: Check SPDX source headers
        run: node scripts/check-spdx-headers.mjs

      - name: Check dead buttons
        # Regression guard for the 2026-04-22 audit: every CTA in the
        # admin console must resolve to a real navigate() / onClick /
        # <Link to>. Static-checks the Btn/Link usage in apps/admin
        # so dead-click regressions fail PR CI before they ship.
        run: node scripts/check-dead-buttons.mjs

      - name: Check config docs are in sync
        # Regression guard: docs/CONFIG_REFERENCE.md is auto-generated from
        # apps/admin/src/lib/configDocs.ts and must not drift. Run
        # `pnpm gen:config-docs` and commit the result if this fails.
        run: pnpm check:config-docs

      - name: Check README stats are in sync
        # Regression guard: root README at-a-glance badges (migrations, edge
        # functions, npm packages, etc.) must match scripts/lib/docs-stats.mjs.
        run: pnpm check:docs-stats

      - name: Check narrative & positioning consistency
        # Anti-drift guard for the VISION.md constitution: the v2 hero must lead
        # every primary README (no stale taglines), the north-star / category /
        # buyer / "will not"s must stay aligned across VISION.md, AGENTS.md,
        # README.md, and package.json, and every publishable package must keep
        # its canonical homepage/repository cross-links. Canonical copy lives in
        # packages/brand (MUSHI_TAGLINE_V2) and /VISION.md.
        run: pnpm check:narrative

      - name: Check SDK version matrix
        run: pnpm check:sdk-version-matrix

      - name: Check Flutter PII pattern sync
        # Regression guard for production-readiness audit item #16: the
        # Flutter SDK's PII scrubber (packages/flutter/lib/src/pii_patterns.g.dart)
        # is generated from packages/core/src/pii-patterns.json, the same
        # source the JS/TS pii-scrubber.ts consumes. Fails if the JSON changed
        # without regenerating + committing the Dart copy.
        run: pnpm check:flutter-pii-patterns

      - name: Check internal doc links
        run: pnpm check:internal-doc-links

      - name: Check web bundle docs
        run: pnpm check:bundle-docs

      - name: Check Migration Hub catalog sync
        # Regression guard for Migration Hub Phase 2: the docs catalog
        # (apps/docs/content/migrations/_catalog.ts), CLI catalog
        # (packages/cli/src/migrate.ts), backend slug allowlist
        # (packages/server/supabase/functions/api/migration-progress-helpers.ts),
        # and admin card catalog (apps/admin/src/lib/migrationsCatalog.ts)
        # must stay in lockstep — adding a guide in one without updating
        # the others used to ship as silent /v1/admin/migrations/progress
        # 400s and bare-slug rendering on the in-progress card.
        run: pnpm check:migration-catalog

      - name: Check Edge Function import boundaries
        # Regression guard for the 2026-05-05 inventory-crawler / synthetic-
        # monitor deploy failure: `_shared/inventory-guards.ts` reached
        # into `../api/shared.ts` for `accessibleProjectIds`, but the
        # deploy bundler (scripts/deploy-edge-function.mjs) only ships
        # `<function>/` plus `_shared/`. The unresolved import made
        # Supabase reject the deploy with a misleading HTTP 400. This
        # guard fails the PR if any `_shared/` file or any function dir
        # imports across function boundaries via a relative path.
        run: pnpm check:edge-fn-imports

      - name: Check for destructive migrations
        # Data-integrity gate (D2): fails if any migration file contains a
        # bare DELETE FROM or TRUNCATE without a WHERE clause. Such statements
        # in migrations can cause irrecoverable data loss in production.
        # Annotate the offending line with `-- migration-check: allow-destructive`
        # (with a comment explaining why) to bypass the gate intentionally.
        run: node scripts/check-destructive-migrations.mjs

      - name: Check JSX unicode escapes
        # Regression guard for the 2026-04-23 InboxPage bug: a `\uXXXX`
        # sequence inside a JSX attribute value or JSX text child renders
        # as the literal six-character escape, not the intended glyph,
        # because JSX surfaces are HTML-attribute-like rather than JS
        # string literals. Catches the bad form before it ships.
        run: node scripts/check-jsx-unicode-escapes.mjs

      - name: Check bundle sizes
        # Starter budgets on react-native/node/capacitor/angular/svelte/vue
        # (production-readiness audit item #14) so a regression on any
        # publishable package is caught in CI, not just core/web/react.
        run: pnpm --filter @mushi-mushi/core --filter @mushi-mushi/web --filter @mushi-mushi/react --filter @mushi-mushi/react-native --filter @mushi-mushi/node --filter @mushi-mushi/capacitor --filter @mushi-mushi/angular --filter @mushi-mushi/svelte --filter @mushi-mushi/vue exec size-limit

      # ── MCP package gates ──────────────────────────────────────────────────
      # Regression guard: keep the MCP package buildable, type-safe, and in
      # sync with its catalog. Without this gate a new tool in catalog.ts
      # that is never registered in server.ts (or vice versa) ships silently
      # and breaks agents that enumerate tools.
      - name: MCP typecheck
        run: pnpm --filter @mushi-mushi/mcp typecheck

      - name: MCP test
        run: pnpm --filter @mushi-mushi/mcp test

      - name: MCP build
        run: pnpm --filter @mushi-mushi/mcp build

      - name: MCP catalog sync (strict parity)
        run: node packages/mcp/scripts/check-catalog-sync.mjs --strict-full-parity

      - name: MCP smoke (stdio)
        # Spawns the stdio binary and verifies it advertises the expected
        # tool/resource/prompt set from the catalog. Catches register-but-
        # not-catalog and catalog-but-not-register bugs before publish.
        run: pnpm --filter @mushi-mushi/mcp test:smoke

      - name: MCP smoke (HTTP)
        # Skips when MUSHI_MCP_HTTP_URL / MUSHI_MCP_API_KEY are unset.
        run: pnpm --filter @mushi-mushi/mcp test:smoke-http
        env:
          MUSHI_MCP_HTTP_URL: ${{ secrets.MUSHI_MCP_HTTP_URL }}
          MUSHI_MCP_API_KEY: ${{ secrets.MUSHI_MCP_E2E_API_KEY }}

      - name: Cursor plugin manifest validation
        # Validates the Cursor plugin bundle has a well-formed plugin.json
        # and that all referenced files (mcp.json, SKILL.md, .mdc, .md
        # commands) exist.
        run: node scripts/check-cursor-plugin.mjs

  e2e:
    # End-to-end Playwright dogfood suite. Runs against a local Supabase
    # stack spun up by the Supabase CLI action — no cloud credentials
    # required. GitHub is mocked by msw so the Act stage is hermetic (set
    # E2E_LIVE_GITHUB=1 to override on demand).
    #
    # Opt-in via repository variable `ENABLE_E2E_CI=true`. When disabled
    # the job is skipped entirely so it doesn't show as a failure on PRs
    # while the Anthropic / OpenAI / Supabase CI secrets are still being
    # provisioned. Flip the variable to 'true' once secrets are seeded:
    #
    #   gh variable set ENABLE_E2E_CI --body 'true'
    #   gh secret set ANTHROPIC_API_KEY_CI --body '<key>'
    #   gh secret set OPENAI_API_KEY_CI    --body '<key>'
    #
    # Kept in a separate job so a flake here doesn't block the fast build
    # CI feedback loop.
    name: E2E (full-PDCA dogfood)
    if: ${{ vars.ENABLE_E2E_CI == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_URL: http://127.0.0.1:54321
      MUSHI_ADMIN_URL: http://127.0.0.1:6464
      # These are Supabase CLI's deterministic local keys — safe to
      # commit because they only authorise the ephemeral local stack.
      SUPABASE_ANON_KEY: ${{ vars.SUPABASE_LOCAL_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ vars.SUPABASE_LOCAL_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CI }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_CI }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Supabase CLI
        uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333  # v2.0.0
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Start local Supabase stack
        working-directory: packages/server
        run: supabase start --ignore-health-check

      - name: Install Playwright browsers
        run: pnpm --filter @mushi-mushi/e2e-dogfood install-browsers

      - name: Start admin dev server
        run: |
          pnpm --filter @mushi-mushi/admin dev &
          # Wait until Vite is listening on :6464 so the first nav doesn't
          # race the cold-start window.
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:6464 >/dev/null; then break; fi
            sleep 1
          done

      - name: Run full-PDCA dogfood suite
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report
          path: examples/e2e-dogfood/playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        working-directory: packages/server
        run: supabase stop || true
