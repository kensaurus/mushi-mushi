##
# FILE: deploy-cloud.yml
# PURPOSE: Build and deploy the Mushi Mushi cloud Next.js app (apps/cloud) to
#          Vercel, then re-point CloudFront's /mushi-mushi/* default behavior
#          at the new Vercel deployment.
#
# OVERVIEW:
# - Vercel hosts the Next.js SSR runtime (server actions, Supabase auth cookies,
#   Stripe checkout). CloudFront proxies kensaur.us/mushi-mushi/* to it so the
#   user-facing domain stays unified.
# - basePath is `/mushi-mushi`; assetPrefix is the same. The same build can be
#   previewed locally at / by leaving MUSHI_BASE_PATH unset.
# - CloudFront origin + behavior changes are applied by the
#   cloudfront-mushi-update-distribution.mjs script (idempotent).
#
# DEPENDENCIES:
# - Vercel project linked to apps/cloud (project name: mushi-mushi-cloud)
# - GitHub Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_CLOUD,
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, CLOUDFRONT_DISTRIBUTION_ID,
#   VERCEL_CLOUD_HOSTNAME (e.g. mushi-mushi-cloud.vercel.app)
# - The deploy-admin and deploy-docs workflows must have run at least once,
#   so the four CloudFront Functions exist and we can read their ARNs.
##

name: Deploy Cloud Site

on:
  push:
    branches: [master]
    paths:
      - 'apps/cloud/**'
      - 'scripts/cloudfront-mushi-update-distribution.mjs'
  workflow_dispatch:

concurrency:
  group: deploy-cloud
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: us-east-1   # CloudFront API is global but billed via us-east-1
  MUSHI_BASE_PATH: /mushi-mushi

jobs:
  deploy:
    name: Build, Deploy, Wire CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel project metadata
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLOUD }}
        run: |
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }} \
            apps/cloud

      - name: Build cloud app for Vercel
        env:
          MUSHI_BASE_PATH: ${{ env.MUSHI_BASE_PATH }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLOUD }}
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            apps/cloud

      - name: Deploy prebuilt artifact to Vercel
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLOUD }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            apps/cloud)
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Vercel deploy URL: ${DEPLOY_URL}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read CloudFront Function ARNs
        id: funcs
        run: |
          ADMIN_ROUTER_ARN=$(aws cloudfront describe-function \
            --name mushi-mushi-spa-router --region us-east-1 \
            --query 'FunctionSummary.FunctionMetadata.FunctionARN' --output text)
          ADMIN_RESPONSE_ARN=$(aws cloudfront describe-function \
            --name mushi-mushi-spa-response --region us-east-1 \
            --query 'FunctionSummary.FunctionMetadata.FunctionARN' --output text)
          DOCS_ROUTER_ARN=$(aws cloudfront describe-function \
            --name mushi-mushi-docs-router --region us-east-1 \
            --query 'FunctionSummary.FunctionMetadata.FunctionARN' --output text)
          DOCS_RESPONSE_ARN=$(aws cloudfront describe-function \
            --name mushi-mushi-docs-response --region us-east-1 \
            --query 'FunctionSummary.FunctionMetadata.FunctionARN' --output text)
          echo "admin_router=$ADMIN_ROUTER_ARN" >> "$GITHUB_OUTPUT"
          echo "admin_response=$ADMIN_RESPONSE_ARN" >> "$GITHUB_OUTPUT"
          echo "docs_router=$DOCS_ROUTER_ARN" >> "$GITHUB_OUTPUT"
          echo "docs_response=$DOCS_RESPONSE_ARN" >> "$GITHUB_OUTPUT"

      - name: Wire CloudFront origins + behaviors
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          VERCEL_CLOUD_HOSTNAME: ${{ secrets.VERCEL_CLOUD_HOSTNAME }}
          ADMIN_SPA_ROUTER_FUNCTION_ARN: ${{ steps.funcs.outputs.admin_router }}
          ADMIN_SPA_RESPONSE_FUNCTION_ARN: ${{ steps.funcs.outputs.admin_response }}
          DOCS_ROUTER_FUNCTION_ARN: ${{ steps.funcs.outputs.docs_router }}
          DOCS_RESPONSE_FUNCTION_ARN: ${{ steps.funcs.outputs.docs_response }}
        run: node scripts/cloudfront-mushi-update-distribution.mjs

      - name: Post-deploy health check
        run: |
          sleep 15
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://kensaur.us/mushi-mushi/" || echo "000")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Cloud root health check returned HTTP $HTTP_CODE — CloudFront may still be propagating"
            exit 0
          fi
          echo "Cloud landing reachable at https://kensaur.us/mushi-mushi/"
