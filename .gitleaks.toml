# Gitleaks configuration for mushi-mushi.
# Extends the bundled default ruleset and only ADDS a narrow path allowlist,
# so real leaks elsewhere are still caught.

[extend]
useDefault = true

[allowlist]
description = "Path allowlist for a redacted legacy-AWS audit note, plus fake Mushi test-fixture keys. Default OR condition: a match on any path OR regex is allowed. The regex only covers obviously-fake fixtures (mushi_test… / mushi_abcdefgh…); real keys are mushi_live_/mushi_pk_ and are still caught."
paths = [
  # Redacted AWS access key ID (a public identifier, not a secret) in an audit note.
  '''docs/audit-2026-06-24/pre-launch-hardening-complete\.md''',
]
regexes = [
  # Hard-coded fake API keys used as fixtures in CLI unit tests.
  '''mushi_(?:test|abcdefgh)[A-Za-z0-9_]*''',
]
