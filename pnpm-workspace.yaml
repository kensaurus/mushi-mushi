packages:
  - "packages/*"
  - "apps/*"
  - "tooling/*"
  - "examples/*"

# ---------------------------------------------------------------------------
# Supply-chain hardening (pnpm)
#
# This is the setting that actually runs in CI: every Release/CI workflow
# invokes `pnpm install --frozen-lockfile`, and pnpm reads its config from
# pnpm-workspace.yaml (npm's `.npmrc` is a fallback for non-pnpm flags only).
#
# minimumReleaseAge: 10080
#   = 7 days × 24 h × 60 min. Refuses to resolve a package version that was
#     published less than 7 days ago, slamming shut the window in which
#     real-world npm supply-chain attacks were detected and removed
#     (Axios 1.14.1 / 0.30.4: ~5 hours; Shai-Hulud worm Sept 2025: <12 h).
#     A 7-day cooldown would have blocked every public 2025–2026 incident.
#     SOURCE: https://pnpm.io/settings#minimumreleaseage
#
# minimumReleaseAgeExclude:
#   Our own scope is exempt so internal dogfooding (e.g. `pnpm add
#   @mushi-mushi/react@latest` minutes after a publish) keeps working.
# ---------------------------------------------------------------------------
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@mushi-mushi/*"
  - "mushi-mushi"
  # Security-patched transitive dep. fast-uri 3.1.2 fixes
  # GHSA-q3j6-qgpj-74h6 (path traversal) + the host-confusion CVE pulled
  # in via @modelcontextprotocol/sdk → ajv. Patch shipped 2026-05-05; we
  # exempt it from the 7-day cooldown because the HIGH-severity vuln is
  # in every <=3.1.0 release and we run npm audit signatures + provenance
  # in CI as compensating controls.
  - "fast-uri"
  # devalue 5.8.1 fixes GHSA-77vg-94rm-hx3p (DoS via sparse array). Patch
  # shipped 2026-05-15; exempt from 7-day cooldown — CI dependency-review
  # and npm audit --audit-level=high both gate on this advisory.
  - "devalue"
  # protobufjs 7.5.6 fixes GHSA-66ff-xgx4-vchm / GHSA-jvwf-75h9-cwgg /
  # GHSA-75px-5xx7-5xc7 / GHSA-685m-2w69-288q (4 HIGH CVEs). Exempt from
  # 7-day cooldown — same compensating controls as devalue above.
  - "protobufjs"
  # form-data 4.0.6 fixes GHSA-fjxv-7rqg-78g4 (HIGH: CRLF injection via
  # unescaped field names). Pulled in transitively via node-fetch in the dev
  # SDKs. Published 2026-06-13; exempt from the 7-day cooldown because the
  # vuln is in every <4.0.6 release and CI runs npm audit + provenance as
  # compensating controls. Enforced tree-wide via pnpm.overrides.
  - "form-data"
  # undici 7.28.0 / 8.5.0 fix GHSA-pr7r-676h-xcf6 (HIGH: TLS certificate
  # validation bypass) + the WebSocket-client DoS advisory. Dev/test-only in
  # this tree (pulled via jsdom for the admin vitest DOM env). Patches shipped
  # 2026-06-15; exempt from the 7-day cooldown so the pnpm.overrides above can
  # resolve the patched versions, keeping the `npm audit --audit-level=high`
  # CI gate green. undici is maintained by the Node.js core team (low
  # supply-chain risk) and provenance/audit-signatures run as compensating controls.
  - "undici"
  # next 16.2.11 fixes GHSA-6gpp-xcg3-4w24 (App Router middleware/proxy
  # bypass), GHSA-m99w-x7hq-7vfj (App Router DoS), and GHSA-89xv-2m56-2m9x +
  # GHSA-p9j2-gv94-2wf4 (SSRF via Server Actions / rewrites) — 4 HIGH CVEs
  # in every next >=16.0.0 <16.2.11. Used only by the apps/docs + apps/testers
  # marketing surfaces. Published 2026-07; exempt from the 7-day cooldown
  # because the advisories affect every prior 16.x and CI runs dependency-review
  # + npm audit --audit-level=high as compensating controls. The @next/swc-*
  # native binaries are published in lockstep with next by the same team, so
  # they share the exemption (otherwise the cooldown blocks the patched build).
  - "next"
  - "@next/*"

# strictDepBuilds: fail-fast on any dep that tries to run a postinstall
# hook the workspace hasn't pre-approved (via .npmrc → onlyBuiltDependencies
# or this file's allowBuilds). Without this, pnpm only warns and keeps
# installing — turning it on means a malicious postinstall slipping into a
# transitive dep stops the install instead of running silently.
# SOURCE: https://pnpm.io/settings#strictdepbuilds  (default flips to true
# in pnpm v11; opt-in in 10.x)
strictDepBuilds: true

# blockExoticSubdeps: refuses to install transitive dependencies that resolve
# to a git URL, tarball URL, or filesystem path (i.e. anything that didn't
# go through the npm registry's signing pipeline). Direct workspace deps
# can still use these — but a malicious or compromised dep can't pull a
# silent git checkout into the tree.
# SOURCE: https://pnpm.io/settings#blockexoticsubdeps  (added pnpm 10.26)
blockExoticSubdeps: true
