name: 'Mushi Mushi CI Gate'
description: 'Run Mushi Mushi MCP tools from GitHub Actions — trigger judge, dispatch fixes, gate PR merges on classification coverage.'
author: 'Kenji Sakuramoto'
branding:
  icon: bug
  color: green

inputs:
  api-key:
    description: 'Mushi project API key (store as a repo secret).'
    required: true
  project-id:
    description: 'Mushi project UUID.'
    required: true
  api-endpoint:
    description: 'Override API endpoint for self-hosted instances.'
    required: false
    default: 'https://dxptnwrhwsqckaftyymj.supabase.co/functions/v1/api'
  command:
    description: 'Which MCP tool to run: trigger-judge | dispatch-fix | check-coverage | query | gates | discover-api'
    required: true
  report-id:
    description: 'Report UUID — required for dispatch-fix.'
    required: false
  question:
    description: 'NL query text — required for command=query.'
    required: false
  min-coverage:
    description: 'For check-coverage: minimum classified/total ratio to pass.'
    required: false
    default: '0.8'
  fail-on-quota:
    description: 'Whether to fail the action when Mushi returns 402 QUOTA_EXCEEDED.'
    required: false
    default: 'true'
  commit-sha:
    description: 'For command=gates: commit SHA the gates run against. Defaults to GITHUB_SHA.'
    required: false
  pr-number:
    description: 'For command=gates: pull-request number, used to scope findings on the admin UI.'
    required: false
  gates:
    description: 'For command=gates: comma-separated subset to run. Defaults to "all".'
    required: false
    default: 'all'
  repo-root:
    description: 'For command=discover-api: directory to walk for Next.js route handlers + OpenAPI files. Defaults to GitHub workspace.'
    required: false
  openapi-file:
    description: 'For command=discover-api: explicit OpenAPI file path. Defaults to <repo-root>/openapi.yaml.'
    required: false
  supabase-url:
    description: 'For command=discover-api: Supabase project URL to introspect via /rest/v1/.'
    required: false
  supabase-anon-key:
    description: 'For command=discover-api: Supabase anon key for introspection.'
    required: false

outputs:
  result:
    description: 'JSON payload returned by the MCP tool.'
  coverage:
    description: 'For check-coverage: observed classified ratio.'

runs:
  using: 'node20'
  main: 'dist/cli.js'
