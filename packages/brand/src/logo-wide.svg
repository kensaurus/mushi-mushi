<svg xmlns="http://www.w3.org/2000/svg" width="540" height="64" viewBox="0 0 540 64">
  <title>Mushi Mushi — Bug triage and agentic fix for AI coding agents</title>

  <!-- Stamp -->
  <g transform="translate(8,8) rotate(-3,24,24)">
    <rect x="0" y="0" width="48" height="48" rx="8" fill="#E03C2C"/>
    <text
      x="24" y="38"
      text-anchor="middle"
      fill="#F8F4ED"
      font-family="'Hiragino Mincho ProN','Yu Mincho Pr6N','Yu Mincho','Source Han Serif JP','Noto Serif CJK JP','SimSun',serif"
      font-weight="700"
      font-size="34">&#x866B;</text>
  </g>

  <!-- Wordmark -->
  <text
    x="72" y="40"
    fill="#1C1009"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.4">Mushi Mushi</text>

  <!-- Separator -->
  <circle cx="213" cy="32" r="3" fill="#E03C2C"/>

  <!-- Tagline -->
  <text
    x="224" y="40"
    fill="#5C4033"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="15"
    font-weight="400">Bug triage &amp; agentic fix for AI coding agents</text>
</svg>
