name: mushi_mushi
description: Flutter SDK for Mushi Mushi — the open-source LLM-driven bug intake & autofix platform.
version: 0.3.0
homepage: https://mushimushi.dev
repository: https://github.com/kenroy/mushi-mushi
issue_tracker: https://github.com/kenroy/mushi-mushi/issues
documentation: https://docs.mushimushi.dev/sdks/flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  path_provider: ^2.1.4
  sensors_plus: ^6.0.1
  package_info_plus: ^8.0.2
  device_info_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.25.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.mushimushi.flutter
        pluginClass: MushiMushiPlugin
      ios:
        pluginClass: MushiMushiPlugin
