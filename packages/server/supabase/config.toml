[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://kensaur.us/mushi-mushi/"
additional_redirect_urls = [
  "http://localhost:5173/mushi-mushi/",
  "http://localhost:3000",
  "https://kensaur.us/mushi-mushi/**",
]

[auth.email]
enable_signup = true
enable_confirmations = true
max_frequency = "60s"

[auth.email.template.confirmation]
subject = "Confirm your Mushi Mushi account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your password — mushimushi"
content_path = "./supabase/templates/recovery.html"

# Team invitations. Body uses {{ .Data.inviter_name }},
# {{ .Data.org_name }}, {{ .Data.role }}, {{ .Data.note }}, and
# {{ .Data.reminder }} (1 = day-3 nudge, 2 = day-6 final) — set
# server-side by the api function and the invitation-reminders cron.
[auth.email.template.invite]
subject = "You've been invited to a Mushi Mushi workspace"
content_path = "./supabase/templates/invite-user.html"

[storage]
enabled = true
file_size_limit = "1GiB"

# fix-worker is invoked via service-role from the api function. It re-validates
# the dispatchId against fix_dispatch_jobs before doing any work, so JWT
# verification at the platform edge is unnecessary and would force the api
# function to mint a user JWT for every dispatch.
[functions.fix-worker]
verify_jwt = false

# api function does its own JWT validation in the jwtAuth middleware via
# db.auth.getUser(token), which works with any algorithm. Disabling gateway-
# level JWT verification avoids the platform gateway rejecting ES256-signed
# tokens (issued when the project's JWT signing key is ECC).
[functions.api]
verify_jwt = false

# Internal pipeline functions invoked server-to-server from `api` using the
# service-role key. After Supabase rotated to the new sb_secret_* key format,
# the platform gateway started rejecting these inter-function calls with
# UNAUTHORIZED_INVALID_JWT_FORMAT. Each of these functions:
#   - re-validates reportId / projectId in the body before doing work,
#   - reads via service-role client (bypasses RLS),
#   - is never exposed publicly.
# Gateway-level JWT verification is therefore unnecessary and was actively
# breaking the pipeline.
[functions.fast-filter]
verify_jwt = false

[functions.classify-report]
verify_jwt = false

[functions.judge-batch]
verify_jwt = false

# mcp is the Model Context Protocol Streamable HTTP transport
# (2025-03-26 spec). Public endpoint reached by external orchestrators
# (Cursor remote MCP, OpenAI Agents SDK, Anthropic Claude Agent SDK in
# hosted mode, A2A discovery). Authentication happens INSIDE the handler
# via dual-mode auth (X-Mushi-Api-Key with mcp:read|write scope, OR a
# Supabase JWT). The platform gateway's verify_jwt MUST be false —
# otherwise every API-key call is rejected at the gateway before our own
# scope check runs, and every agent card promise of MCP-over-HTTP fails
# with a 401 the operator can do nothing about.
[functions.mcp]
verify_jwt = false

# webhooks-github-indexer authenticates GitHub via X-Hub-Signature-256 (HMAC),
# and the hourly sweep cron POSTs with the service-role bearer + signed body.
# Both auth paths happen inside the function, so the platform gateway must
# not require its own JWT.
[functions.webhooks-github-indexer]
verify_jwt = false

# sentry-seer-poll is invoked exclusively by pg_cron with the service-role
# bearer; it re-checks projects.sentry_seer_enabled before doing any work.
[functions.sentry-seer-poll]
verify_jwt = false

# library-modernizer is invoked weekly by pg_cron (Wave E) with the
# service-role bearer; it scrapes upstream release notes via Firecrawl and
# files modernization findings + synthetic enhancement reports.
[functions.library-modernizer]
verify_jwt = false

# prompt-auto-tune is invoked weekly by pg_cron (Wave E §4) with the
# service-role bearer; it inspects judge failures, asks the LLM for a
# revised prompt, and files it as an auto-generated candidate in
# prompt_versions. Never auto-promotes — the Prompt Lab UI surfaces the
# candidate diff for human approval.
[functions.prompt-auto-tune]
verify_jwt = false

# ci-sync backfills fix_attempts.check_run_conclusion for PRs the webhook
# path never delivered. Invoked by pg_cron (mushi-ci-sync-10m) and by the
# api function (/v1/admin/fixes/:id/refresh-ci). Uses requireServiceRoleAuth
# to gate both paths — external callers can never hit the GitHub API through
# this function.
[functions.ci-sync]
verify_jwt = false

# retention-sweep is invoked daily by pg_cron with the internal-caller
# bearer. It walks every project, resolves the effective retention window
# from project_retention_policies → pricing_plans.retention_days → hobby
# fallback, and deletes reports older than the cutoff in 1k-row batches.
# Auth is enforced inside the handler via requireServiceRoleAuth — the
# function MUST NOT be reachable without the shared internal secret.
[functions.retention-sweep]
verify_jwt = false

# stripe-webhooks receives signed POSTs from Stripe (HMAC-SHA256 via
# `stripe-signature`). Stripe does NOT mint a Supabase JWT, so the platform
# gateway's verify_jwt MUST be false — otherwise every webhook delivery is
# rejected with 401 at the gateway and the function code never runs.
# Signature verification happens inside the handler via verifyStripeSignature.
[functions.stripe-webhooks]
verify_jwt = false

# slack-interactions receives signed POSTs from Slack (HMAC-SHA256 via
# `x-slack-signature`, v0 spec). Same reasoning as stripe-webhooks — the
# platform gateway's verify_jwt MUST be false because Slack doesn't carry a
# Supabase JWT. Signature verification happens inside the handler.
[functions.slack-interactions]
verify_jwt = false

# v2 inventory pipeline — invoked server-to-server from `api` (service-role)
# or pg_cron (internal bearer). Handlers re-validate project/report ids.
[functions.inventory-crawler]
verify_jwt = false

[functions.inventory-gates]
verify_jwt = false

[functions.sentinel-audit]
verify_jwt = false

[functions.status-reconciler]
verify_jwt = false

[functions.synthetic-monitor]
verify_jwt = false

[functions.test-gen-from-report]
verify_jwt = false

# v2.1 inventory proposer — invoked from `api` (service-role) when an admin
# clicks "Generate draft inventory". Calls Claude with the observed-routes
# aggregate and writes an inventory_proposals row.
[functions.inventory-propose]
verify_jwt = false

# invitation-reminders is invoked hourly by pg_cron (`dispatch_invitation_reminders`)
# with the internal-caller bearer. It scans pending invitations and re-sends
# the auth email for any that hit the day-3 nudge or day-6 final windows.
# Auth is enforced inside the handler via requireServiceRoleAuth — the
# function MUST NOT be reachable without the shared internal secret because
# its work product is a real outbound email through the auth provider.
[functions.invitation-reminders]
verify_jwt = false

# a2a-push-notify fires when a fix_dispatch_jobs row's status flips and the
# row carries an A2A v1.0.0 PushNotificationConfig. Invoked exclusively by
# `trg_fix_dispatch_jobs_a2a_push` via pg_net with the service-role bearer;
# requireServiceRoleAuth gates the handler so external callers cannot replay
# task notifications. JWT verification at the gateway stays off for the same
# reason as the other internal pipeline functions above.
[functions.a2a-push-notify]
verify_jwt = false

# 2026-05-24 backfill: every entry below this line is for a function that was
# already deployed to production with `verify_jwt = false` via legacy
# `supabase functions deploy --no-verify-jwt` invocations (or earlier versions
# of `scripts/deploy-edge-function.mjs` that defaulted to false). When the
# strict-default script (which falls back to platform default `true` when the
# config.toml entry is missing) re-deployed these functions, the gateway
# started rejecting cron callers with `UNAUTHORIZED_INVALID_JWT_FORMAT`
# because cron sends a non-JWT 64-char internal-caller token via
# `mushi.edge_function_post()`. All nine functions authenticate inside the
# handler via `requireServiceRoleAuth`, so the platform JWT gate must stay
# off for them. Pinning the setting here makes the contract explicit and
# survives any future redeploy.

# plugin-dispatch-retry runs every minute via pg_cron `mushi-plugin-dispatch-retry`
# (see migration 20260423040000_wave_t_runtime_config_and_rls_initplan.sql). It
# walks `plugin_dispatch_attempts` and re-fires failed plugin webhooks. Auth is
# enforced inside the handler.
[functions.plugin-dispatch-retry]
verify_jwt = false

# qa-story-runner runs every minute via pg_cron `qa-story-runner-tick` (see
# migration 20260516000000_qa_story_runner_cron.sql). It picks up due stories
# from `qa_stories` and dispatches them to firecrawl_actions / browserbase /
# local providers. Auth is enforced inside the handler.
[functions.qa-story-runner]
verify_jwt = false

# usage-aggregator runs hourly via pg_cron `mushi-usage-aggregator-hourly`. It
# rolls `usage_events` rows into Stripe Meter Events and writes idempotency
# keys back. Auth is enforced inside the handler.
[functions.usage-aggregator]
verify_jwt = false

# intelligence-report runs weekly via pg_cron. It writes a narrative LLM summary
# of KPI trends into `intelligence_reports`. Auth is enforced inside the handler.
[functions.intelligence-report]
verify_jwt = false

# recompute-tester-reputation runs daily via pg_cron. It walks tester submissions
# and recomputes accept/reject ratios + tier badges. Auth is enforced inside the
# handler.
[functions.recompute-tester-reputation]
verify_jwt = false

# reward-payout-aggregator runs daily via pg_cron. It batches accepted tester
# submissions into Tremendous payout orders. Auth is enforced inside the handler
# (and a sanctions check gates the actual payout).
[functions.reward-payout-aggregator]
verify_jwt = false

# generate-synthetic runs hourly via pg_cron. It runs Playwright smoke tests
# defined in `synthetic_monitors` and writes results to `synthetic_results`.
# Auth is enforced inside the handler.
[functions.generate-synthetic]
verify_jwt = false

# soc2-evidence is invoked by `api` (admin export) and by pg_cron (daily backup).
# It collects SOC 2 evidence artifacts from `audit_log` + `change_history` and
# uploads to the `soc2-evidence` storage bucket. Auth is enforced inside the
# handler.
[functions.soc2-evidence]
verify_jwt = false

# integration-health-probe runs every 5 min via pg_cron. It pings configured
# project integrations (Slack, Linear, Jira) and updates `project_integrations.
# last_health_check_at`. Auth is enforced inside the handler.
[functions.integration-health-probe]
verify_jwt = false

# sdk-versions-cron runs daily at 02:30 UTC (pg_cron) to reconcile the
# sdk_versions catalogue against the npm registry. Auth inside via
# requireServiceRoleAuth; the pg_cron job sends the service-role bearer.
[functions.sdk-versions-cron]
verify_jwt = false

# sdk-upgrade-worker is invoked fire-and-forget by the api function when a
# user triggers a one-click SDK upgrade. It resolves the GitHub token, reads
# the repo's package.json(s), bumps @mushi-mushi/* versions, and opens a
# draft PR. Auth inside via requireServiceRoleAuth; only the api function
# invokes it.
[functions.sdk-upgrade-worker]
verify_jwt = false

# codebase-analyze-worker builds UA-shaped graph JSON after push or manual
# Re-analyze. Invoked fire-and-forget by api + webhooks-github-indexer.
[functions.codebase-analyze-worker]
verify_jwt = false

[functions.console-knowledge-build]
verify_jwt = false
