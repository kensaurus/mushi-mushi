[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://kensaur.us/mushi-mushi/"
additional_redirect_urls = [
  "http://localhost:5173/mushi-mushi/",
  "http://localhost:3000",
  "https://kensaur.us/mushi-mushi/**",
]

[auth.email]
enable_signup = true
enable_confirmations = true
max_frequency = "60s"

[auth.email.template.confirmation]
subject = "Confirm your email — mushimushi"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your password — mushimushi"
content_path = "./supabase/templates/recovery.html"

[storage]
enabled = true
file_size_limit = "1GiB"

# fix-worker is invoked via service-role from the api function. It re-validates
# the dispatchId against fix_dispatch_jobs before doing any work, so JWT
# verification at the platform edge is unnecessary and would force the api
# function to mint a user JWT for every dispatch.
[functions.fix-worker]
verify_jwt = false

# api function does its own JWT validation in the jwtAuth middleware via
# db.auth.getUser(token), which works with any algorithm. Disabling gateway-
# level JWT verification avoids the platform gateway rejecting ES256-signed
# tokens (issued when the project's JWT signing key is ECC).
[functions.api]
verify_jwt = false

# Internal pipeline functions invoked server-to-server from `api` using the
# service-role key. After Supabase rotated to the new sb_secret_* key format,
# the platform gateway started rejecting these inter-function calls with
# UNAUTHORIZED_INVALID_JWT_FORMAT. Each of these functions:
#   - re-validates reportId / projectId in the body before doing work,
#   - reads via service-role client (bypasses RLS),
#   - is never exposed publicly.
# Gateway-level JWT verification is therefore unnecessary and was actively
# breaking the pipeline.
[functions.fast-filter]
verify_jwt = false

[functions.classify-report]
verify_jwt = false

[functions.judge-batch]
verify_jwt = false

# webhooks-github-indexer authenticates GitHub via X-Hub-Signature-256 (HMAC),
# and the hourly sweep cron POSTs with the service-role bearer + signed body.
# Both auth paths happen inside the function, so the platform gateway must
# not require its own JWT.
[functions.webhooks-github-indexer]
verify_jwt = false

# sentry-seer-poll is invoked exclusively by pg_cron with the service-role
# bearer; it re-checks projects.sentry_seer_enabled before doing any work.
[functions.sentry-seer-poll]
verify_jwt = false

# library-modernizer is invoked weekly by pg_cron (Wave E) with the
# service-role bearer; it scrapes upstream release notes via Firecrawl and
# files modernization findings + synthetic enhancement reports.
[functions.library-modernizer]
verify_jwt = false

# prompt-auto-tune is invoked weekly by pg_cron (Wave E §4) with the
# service-role bearer; it inspects judge failures, asks the LLM for a
# revised prompt, and files it as an auto-generated candidate in
# prompt_versions. Never auto-promotes — the Prompt Lab UI surfaces the
# candidate diff for human approval.
[functions.prompt-auto-tune]
verify_jwt = false

# ci-sync backfills fix_attempts.check_run_conclusion for PRs the webhook
# path never delivered. Invoked by pg_cron (mushi-ci-sync-10m) and by the
# api function (/v1/admin/fixes/:id/refresh-ci). Uses requireServiceRoleAuth
# to gate both paths — external callers can never hit the GitHub API through
# this function.
[functions.ci-sync]
verify_jwt = false

# retention-sweep is invoked daily by pg_cron with the internal-caller
# bearer. It walks every project, resolves the effective retention window
# from project_retention_policies → pricing_plans.retention_days → hobby
# fallback, and deletes reports older than the cutoff in 1k-row batches.
# Auth is enforced inside the handler via requireServiceRoleAuth — the
# function MUST NOT be reachable without the shared internal secret.
[functions.retention-sweep]
verify_jwt = false

# stripe-webhooks receives signed POSTs from Stripe (HMAC-SHA256 via
# `stripe-signature`). Stripe does NOT mint a Supabase JWT, so the platform
# gateway's verify_jwt MUST be false — otherwise every webhook delivery is
# rejected with 401 at the gateway and the function code never runs.
# Signature verification happens inside the handler via verifyStripeSignature.
[functions.stripe-webhooks]
verify_jwt = false

# slack-interactions receives signed POSTs from Slack (HMAC-SHA256 via
# `x-slack-signature`, v0 spec). Same reasoning as stripe-webhooks — the
# platform gateway's verify_jwt MUST be false because Slack doesn't carry a
# Supabase JWT. Signature verification happens inside the handler.
[functions.slack-interactions]
verify_jwt = false

# v2 inventory pipeline — invoked server-to-server from `api` (service-role)
# or pg_cron (internal bearer). Handlers re-validate project/report ids.
[functions.inventory-crawler]
verify_jwt = false

[functions.inventory-gates]
verify_jwt = false

[functions.sentinel-audit]
verify_jwt = false

[functions.status-reconciler]
verify_jwt = false

[functions.synthetic-monitor]
verify_jwt = false

[functions.test-gen-from-report]
verify_jwt = false

# v2.1 inventory proposer — invoked from `api` (service-role) when an admin
# clicks "Generate draft inventory". Calls Claude with the observed-routes
# aggregate and writes an inventory_proposals row.
[functions.inventory-propose]
verify_jwt = false
