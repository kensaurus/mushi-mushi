# FILE: docker-compose.yml
# PURPOSE: Self-hosted Mushi Mushi deployment — all services in Docker

version: '3.8'

services:
  postgres:
    image: supabase/postgres:15.8.1.060
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../packages/server/supabase/migrations:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mushimushi}
      POSTGRES_DB: mushimushi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  supabase-auth:
    image: supabase/gotrue:v2.170.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-mushimushi}@postgres:5432/mushimushi
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:9999}
    ports:
      - "9999:9999"

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-mushimushi}@postgres:5432/mushimushi
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_SCHEMAS: public
    ports:
      - "3001:3000"

  supabase-storage:
    image: supabase/storage-api:v1.14.4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-mushimushi}@postgres:5432/mushimushi
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
    volumes:
      - storagedata:/var/lib/storage
    ports:
      - "5000:5000"

  edge-functions:
    build:
      context: ../packages/server
      dockerfile: ../../deploy/Dockerfile.edge
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUPABASE_URL: http://supabase-rest:3000
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
    ports:
      - "8000:8000"

  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    ports:
      - "3000:3000"
    environment:
      VITE_SUPABASE_URL: http://localhost:3001
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddydata:/data
    depends_on:
      - admin
      - edge-functions

volumes:
  pgdata:
  storagedata:
  caddydata:
