# FILE: job-migrate.yaml
# PURPOSE: Kubernetes Job for running database migrations on deploy

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "supabase/postgres:15.8.1.060"
          command:
            - sh
            - -c
            - |
              for f in /migrations/*.sql; do
                echo "Running $f"
                psql "$DATABASE_URL" -f "$f"
              done
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@{{ .Values.global.database.host }}:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: postgres-password
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: {{ .Release.Name }}-migrations
