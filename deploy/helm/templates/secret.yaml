# FILE: secret.yaml
# PURPOSE: Kubernetes Secret for sensitive configuration

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  supabase-service-role-key: {{ .Values.secrets.supabaseServiceRoleKey | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
