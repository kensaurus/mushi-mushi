# FILE: service.yaml
# PURPOSE: Kubernetes Services for API and Admin

apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector:
    app: mushimushi
    component: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-admin
spec:
  selector:
    app: mushimushi
    component: admin
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
